<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <title>مفاجأة لخطيبتي</title>
    <style>
        body { font-family: 'Cairo', sans-serif; background: linear-gradient(135deg, #fdfcfb, #e2d1c3); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .slide { background: rgba(255, 255, 255, 0.95); padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 85%; max-width: 400px; text-align: center; display: none; }
        .active { display: block; }
        .typewriter { font-size: 1.3rem; color: #444; line-height: 1.8; min-height: 120px; }
        .flower-bg { font-size: 70px; margin-bottom: 10px; }
        .scroll-container { display: flex; overflow-x: auto; gap: 10px; padding: 15px 0; margin-top: 15px; }
        img { width: 150px; height: 150px; border-radius: 20px; object-fit: cover; border: 3px solid #d4a373; }
        button { background: #d4a373; color: white; border: none; padding: 12px 35px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #bc8a5f; }
        input { padding: 10px; border-radius: 10px; border: 1px solid #ddd; width: 80%; text-align: center; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="s1" class="slide active">
    <div class="flower-bg">🌹</div>
    <h3 style="color: #555;">مرحباً يا كل حياتي</h3>
    <input type="password" id="pass" placeholder="اكتبي الباسورد هنا">
    <br><button onclick="checkPass()">NEXT</button>
</div>

<div id="s2" class="slide">
    <div id="msg" class="typewriter"></div>
    <button onclick="next(3)">NEXT</button>
</div>

<div id="s3" class="slide">
    <h3 style="color: #d4a373;">ذكرياتنا الجميلة 📸</h3>
    <audio controls><source src="11-Mehma_T2olo (1).mp3" type="audio/mpeg"></audio>
    <div class="scroll-container">
        <img src="IMG-20260628-WA0087.jpg"> <img src="IMG-20260628-WA0088.jpg">
        <img src="IMG-20260628-WA0089.jpg"> <img src="IMG-20260628-WA0090.jpg">
        <img src="IMG-20260628-WA0091.jpg"> <img src="IMG-20260628-WA0092.jpg">
        <img src="IMG-20260628-WA0093.jpg"> <img src="IMG-20260628-WA0094.jpg">
        <img src="IMG-20260628-WA0095.jpg"> <img src="IMG-20260628-WA0096.jpg">
        <img src="IMG-20260628-WA0097.jpg">
    </div>
    <p>بقالنا مع بعض: <span id="timer" style="font-weight: bold; color: #d4a373;"></span></p>
    <button onclick="next(4)">NEXT</button>
</div>

<div id="s4" class="slide">
    <p class="typewriter" id="msg2"></p>
</div>

<script>
    function checkPass() { if(document.getElementById('pass').value == '3320') next(2); else alert('الباسورد غلط!'); }
    
    function next(n) { 
        document.querySelectorAll('.slide').forEach(s => s.classList.remove('active')); 
        document.getElementById('s'+n).classList.add('active');
        if(n == 2) typeWriter("من أول يوم عرفتك وأنا حاسس إن حياتي بقت أحلى. ضحكتك بتخليني أنسى أي هم، وكلامك بيديني طاقة وحب. إنتي مش بس جزء من حياتي، إنتي حياتي كلها. بحبك من قلبي، وهفضل أحبك طول العمر.", "msg");
        if(n == 4) typeWriter("على طول... مهما الدنيا ودتنا فين... هتفضلي أنتِ أغلى حد عندي. أماني وبيتي اللي برتاح فيه 🎀", "msg2");
    }

    function typeWriter(text, elementId) {
        let i = 0;
        let element = document.getElementById(elementId);
        element.innerHTML = "";
        function typing() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(typing, 50);
            }
        }
        typing();
    }
    
    const start = new Date("2025-01-30"); 
    document.getElementById('timer').innerText = Math.floor((new Date() - start) / (1000 * 60 * 60 * 24)) + " يوم";
</script>
</body>
</html>
